<script>
// Scroll reveal
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible') })
},{threshold:0.1})
document.querySelectorAll('.reveal').forEach(el => observer.observe(el))

// Form
function handleSubmit(e){
  e.preventDefault()
  const btn = e.target.querySelector('button')
  const orig = btn.textContent
  btn.textContent = 'Mensagem enviada ✓'
  btn.style.background = '#059669'
  setTimeout(()=>{ btn.textContent = orig; btn.style.background = ''; e.target.reset() },3000)
}

// Funções do Modal de Projetos
function openModal(project){
  if(project === "pepsico"){
    document.getElementById("pepsicoModal").classList.add("active");
  } else if(project === "abb"){
    document.getElementById("abbModal").classList.add("active");
  }
}

function closeModal(){
  document.getElementById("pepsicoModal").classList.remove("active");
  document.getElementById("abbModal").classList.remove("active");
}

// Controlar a troca de imagens na galeria da ABB
function changeAbbImage(imageSrc, thumbnail) {
  document.getElementById('abbMainImage').src = imageSrc;
  
  // Resetar bordas de todas as miniaturas no modal da ABB
  const thumbs = thumbnail.parentElement.getElementsByTagName('img');
  for (let img of thumbs) {
    img.style.borderColor = 'var(--border)';
  }
  // Destacar a miniatura ativa
  thumbnail.style.borderColor = 'var(--blue)';
}

window.onclick = function(event){
  let pepsicoModal = document.getElementById("pepsicoModal");
  let abbModal = document.getElementById("abbModal");
  if(event.target === pepsicoModal || event.target === abbModal){
    closeModal();
  }
}
</script>
